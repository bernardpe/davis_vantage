get_info:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: davis_vantage

set_yearly_rain:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: davis_vantage
    rain_clicks:
      required: true
      example: 500
      selector:
        number:
set_archive_period:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: davis_vantage
    archive_period:
      required: true
      example: 10
      selector:
        select:
          options:
            - "1"
            - "5"
            - "10"
            - "15"
            - "30"
            - "60"
            - "120"
set_rain_collector:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: davis_vantage
    rain_collector:
      required: true
      example: "0.2 mm"
      selector:
        select:
          options:
            - "0.01\""
            - "0.2 mm"
            - "0.1 mm"
